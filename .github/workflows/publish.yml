# 自动构建并发布 Koishi 插件到 npm
# 触发条件：推送形如 <package-name>@<version> 的 tag

name: Publish

on:
  push:
    tags:
      - '**'

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.ref_name, 'koishi-plugin-')
    runs-on: ubuntu-latest

    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE_NAME="${TAG%@*}"
          VERSION="${TAG##*@}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed tag: package=$PACKAGE_NAME version=$VERSION"

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Find plugin directory
        id: find
        run: |
          PLUGIN_DIR=$(yarn workspaces list --json \
            | jq -r --arg name "${{ steps.parse.outputs.package_name }}" \
              'select(.name == $name) | .location')

          if [ -z "$PLUGIN_DIR" ]; then
            echo "::error::Package '${{ steps.parse.outputs.package_name }}' not found in workspace"
            exit 1
          fi

          echo "dir=$PLUGIN_DIR" >> "$GITHUB_OUTPUT"
          echo "Found plugin at: $PLUGIN_DIR"

      - name: Verify version matches
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${{ steps.parse.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Build
        run: yarn workspaces foreach -R --from "${{ steps.parse.outputs.package_name }}" --topological-dev run build

      - name: Test
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          if jq -e '.scripts.test' package.json > /dev/null; then
            yarn test
          else
            echo "No test script defined"
          fi

      - name: Publish to npm
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          TAG_VERSION="${{ steps.parse.outputs.version }}"

          # 含预发布标识时使用对应 dist-tag
          if echo "$TAG_VERSION" | grep -qE '(alpha|beta|rc|next)'; then
            DIST_TAG=$(echo "$TAG_VERSION" | sed -E 's/.*-(alpha|beta|rc|next).*/\1/')
            echo "Publishing with dist-tag: $DIST_TAG"
            yarn npm publish --access public --tag "$DIST_TAG"
          else
            yarn npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
